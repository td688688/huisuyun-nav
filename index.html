<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="汇速云官方导航页，提供用户中心主入口、备用入口和服务状态入口。">
  <title>汇速云导航</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #ffffff;
      --wash: #eef3f8;
      --blue: #2563eb;
      --green: #14885f;
      --amber: #a15c00;
      --violet: #6d4aff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(238, 243, 248, 0.94), rgba(255, 255, 255, 0.98)),
        url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
    }

    main {
      width: min(960px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .hero {
      padding: 28px 0 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 18px;
    }

    .mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--green));
      font-weight: 800;
    }

    h1 {
      margin: 24px 0 10px;
      font-size: 42px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      padding: 18px;
      box-shadow: 0 12px 28px rgba(20, 32, 52, 0.08);
      backdrop-filter: blur(8px);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 6px;
      color: #fff;
      text-decoration: none;
      font-weight: 650;
      font-size: 14px;
    }

    .primary { background: var(--blue); }
    .backup { background: var(--green); }
    .status-link { background: var(--violet); }
    .warn { background: var(--amber); }

    .status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .status div {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      padding: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .status strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 15px;
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      main {
        width: min(100vw - 24px, 960px);
        padding: 24px 0;
      }

      h1 {
        font-size: 32px;
      }

      .grid,
      .status {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <div class="brand">
        <span class="mark">HS</span>
        <span>汇速云官方导航</span>
      </div>
      <h1 id="title">选择用户入口</h1>
      <p class="lead">这里提供面向用户的登录、注册和订阅管理入口。超级用户管理后台已从普通入口拆分，不在导航页公开展示。</p>
    </section>

    <section class="grid" aria-label="入口">
      <article class="card">
        <h2>用户中心</h2>
        <p>主入口用于用户登录、注册、查看套餐、管理订阅、查看节点状态和获取客户端使用信息。</p>
        <div class="actions">
          <a class="button primary" href="https://huisuyun.xyz/login">进入主入口</a>
          <a class="button backup" href="https://huisuyun.online/login">进入备用入口</a>
        </div>
      </article>

      <article class="card">
        <h2>服务状态</h2>
        <p>订阅原始配置不直接展示给普通网页用户。需要刷新节点时，请先登录用户中心，在订阅管理中复制或刷新订阅。</p>
        <div class="actions">
          <a class="button status-link" href="https://huisuyun.xyz/nodes">查看节点状态</a>
          <a class="button warn" href="https://api.huisuyun.online/actuator/health">备用健康检查</a>
        </div>
      </article>
    </section>

    <section class="status" aria-label="状态基线">
      <div>
        <strong>主入口</strong>
        huisuyun.xyz
      </div>
      <div>
        <strong>备用入口</strong>
        huisuyun.online
      </div>
      <div>
        <strong>导航站</strong>
        huisuyun.cfd
      </div>
    </section>

    <footer>
      最后更新：2026-06-25。若所有入口均不可用，请等待维护完成后重试。
    </footer>
  </main>
</body>
</html>
